version: "3.9"

networks:
  chatbi-net:
    external: true

services:
  chatbi-nl2sql:
    image: chatbi-nl2sql:offline-v1
    container_name: chatbi-nl2sql
    restart: always
    # 给容器最高权限，彻底解决 Chroma 权限
    privileged: true
    working_dir: /workspace
    networks:
      - chatbi-net
    security_opt:
      - seccomp=unconfined
    ports:
      - "8001:8001"
    volumes:
      - ./vanna-kbm:/workspace
#      - ./docker-data/chroma:/data/chroma
    environment:
      PYTHONPATH: /workspace/src
    command:
      - uvicorn
      - vanna.examples.chatbi_nl2sql_api:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
